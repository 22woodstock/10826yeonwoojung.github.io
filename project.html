<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Projects</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#f5f7fb;
}

/* 왼쪽 */
.sidebar{
width:260px;
height:100vh;
background:white;
padding:30px;
box-shadow:2px 0 10px rgba(0,0,0,.08);
position:fixed;
}

.sidebar h1{
font-size:45px;
margin-bottom:30px;
}

.sidebar button{
display:block;
width:100%;
margin-bottom:18px;
padding:20px;
border:none;
border-radius:18px;
font-size:28px;
font-weight:bold;
cursor:pointer;
background:#eceff5;
}

.sidebar button.active{
background:black;
color:white;
}

/* 오른쪽 */
.main{
margin-left:320px;
padding:60px;
max-width:900px;
}

.tab{
display:none;
background:white;
padding:50px;
border-radius:30px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.tab.active{
display:block;
}

ul{
font-size:28px;
line-height:1.8;
}

h2{
font-size:54px;
}

a{
display:inline-block;
margin-top:40px;
padding:15px 28px;
background:black;
color:white;
text-decoration:none;
border-radius:14px;
}
</style>
</head>
<body>

<div class="sidebar">
<h1>PROJECTS</h1>

<button class="active" onclick="showTab('t1',this)">
sidebar1
</button>

<button onclick="showTab('t2',this)">
sidebar2
</button>

<button onclick="showTab('t3',this)">
sidebar3
</button>

</div>


<div class="main">

<div id="t1" class="tab active">
<h2>C3 식물과 C4 식물</h2>

<ul>
<li>칼빈 회로를 통한 CO₂ 고정</li>
<li>광호흡 발생</li>
<li>대표: 벼, 밀</li>
<li>C4 식물은 고온 적응</li>
<li>대표: 옥수수, 사탕수수</li>
</ul>

<a href="index.html">
홈으로 돌아가기
</a>
</div>


<div id="t2" class="tab">
<h2>sidebar2</h2>
<p>내용2</p>
</div>

<div id="t3" class="tab">
<h2>sidebar3</h2>
<p>내용3</p>
</div>

</div>


<script>
function showTab(id,btn){

document.querySelectorAll('.tab').forEach(x=>{
x.classList.remove('active');
});

document.querySelectorAll('button').forEach(x=>{
x.classList.remove('active');
});

document.getElementById(id).classList.add('active');
btn.classList.add('active');

}
</script>

</body>
</html>
